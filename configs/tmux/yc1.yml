# tmux has separate configs for macOS and Linux clipboard behavior.
name: tmux
description: tmux configuration
files:
  - source: tmux.conf.macOS
    target: ~/.tmux.conf
    os:
      - darwin
  - source: tmux.conf.linux
    target: ~/.tmux.conf
    os:
      - linux
local_files:
  - tmux.conf.local
dependencies:
  - name: tmux
    check:
      command: tmux
    install:
      darwin: brew install tmux
      linux: sudo apt-get update && sudo apt-get install -y tmux
