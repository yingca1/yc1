# Kitty configuration for macOS + tmux/vim/zsh.
# Installed location: ~/.config/kitty/kitty.conf

# Fonts
font_family JetBrainsMonoNL Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 15.0
disable_ligatures cursor

# Terminal behavior
term xterm-kitty
shell_integration enabled
allow_hyperlinks yes
paste_actions quote-urls-at-prompt
strip_trailing_spaces never
scrollback_lines 20000
scrollback_pager_history_size 10
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab yes

# Cursor
cursor_shape block
cursor_blink_interval 0

# Window layout
remember_window_size yes
initial_window_width 110c
initial_window_height 32c
enabled_layouts splits,stack
window_padding_width 4
window_margin_width 0
window_border_width 0.5pt
hide_window_decorations titlebar-only
confirm_os_window_close 1

# macOS integration
macos_option_as_alt yes
macos_titlebar_color background
macos_show_window_title_in none
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen no

# Tabs
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal

# Remote control is useful for advanced workflows but should not be on by default.
allow_remote_control no

# macOS-native editing/navigation keys.
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+left send_text all \x01
map cmd+right send_text all \x05
map alt+left send_text all \x1b\x62
map alt+right send_text all \x1b\x66
map cmd+backspace send_text all \x15

# Window, tab, and pane controls. tmux remains the primary multiplexer.
map cmd+n new_os_window_with_cwd
map cmd+t new_tab_with_cwd
map cmd+w close_tab
map cmd+shift+w close_os_window
map cmd+enter new_window_with_cwd
map cmd+backslash launch --location=vsplit --cwd=current
map cmd+shift+enter launch --location=hsplit --cwd=current
map cmd+] next_window
map cmd+[ previous_window
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Utility shortcuts.
map cmd+k clear_terminal scroll active
map cmd+shift+r load_config_file
map cmd+shift+f toggle_fullscreen
map cmd+shift+= change_font_size all +1.0
map cmd+plus change_font_size all +1.0
map cmd+shift+- change_font_size all -1.0
map cmd+0 change_font_size all 0

# Kitty helpers that do not conflict with tmux prefix keys.
map ctrl+shift+f kitten hints
map ctrl+shift+u input_unicode_character

include current-theme.conf
